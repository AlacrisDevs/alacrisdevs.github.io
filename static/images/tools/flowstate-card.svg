<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FlowState Tool Card</title>
  <desc id="desc">Design system playground card with layered shapes and token chips</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A121F"/>
      <stop offset="1" stop-color="#10274A"/>
    </linearGradient>
    <linearGradient id="panel" x1="280" y1="260" x2="1320" y2="710" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E9F2FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#E9F2FF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="410" y1="360" x2="1200" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#006CFF"/>
      <stop offset="1" stop-color="#5B9BFF"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" rx="24" fill="url(#bg)"/>
  <rect x="44" y="44" width="1512" height="812" rx="16" stroke="#E9F2FF" stroke-opacity="0.16" stroke-width="2"/>

  <rect x="250" y="210" width="1100" height="500" rx="28" fill="url(#panel)" stroke="#E9F2FF" stroke-opacity="0.24"/>
  <rect x="290" y="260" width="330" height="390" rx="18" fill="#0A121F" fill-opacity="0.62"/>
  <rect x="650" y="260" width="660" height="390" rx="18" fill="#0A121F" fill-opacity="0.48"/>

  <rect x="705" y="318" width="230" height="34" rx="17" fill="#E9F2FF" fill-opacity="0.2"/>
  <rect x="948" y="318" width="230" height="34" rx="17" fill="#E9F2FF" fill-opacity="0.14"/>
  <rect x="705" y="370" width="474" height="14" rx="7" fill="#E9F2FF" fill-opacity="0.22"/>

  <rect x="705" y="422" width="168" height="168" rx="16" fill="url(#accent)"/>
  <rect x="893" y="422" width="130" height="168" rx="16" fill="#E9F2FF" fill-opacity="0.16"/>
  <rect x="1043" y="422" width="136" height="168" rx="16" fill="#E9F2FF" fill-opacity="0.1"/>

  <circle cx="455" cy="375" r="92" fill="#006CFF" fill-opacity="0.25"/>
  <circle cx="455" cy="375" r="58" fill="#E9F2FF" fill-opacity="0.9"/>
  <circle cx="455" cy="375" r="28" fill="#0A121F"/>

  <rect x="360" y="505" width="190" height="14" rx="7" fill="#E9F2FF" fill-opacity="0.28"/>
  <rect x="360" y="536" width="150" height="14" rx="7" fill="#E9F2FF" fill-opacity="0.18"/>

  <text x="128" y="162" fill="#E9F2FF" fill-opacity="0.9" font-family="Urbanist, Arial, sans-serif" font-size="58" font-weight="700">FlowState</text>
  <text x="128" y="220" fill="#E9F2FF" fill-opacity="0.72" font-family="Roboto, Arial, sans-serif" font-size="30" font-weight="400">Design token laboratory</text>
